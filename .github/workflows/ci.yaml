name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: src
      - run: dart analyze --fatal-warnings lib/
        working-directory: src

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: src
      - run: dart format --set-exit-if-changed lib/
        working-directory: src

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: src
      - run: flutter test
        working-directory: src
        continue-on-error: true # No tests yet, don't block PRs