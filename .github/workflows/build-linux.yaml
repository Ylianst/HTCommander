name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config cmake clang libserialport-dev libbluetooth-dev

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Linux
        working-directory: src
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: src/build/linux/x64/release/bundle/

      - name: Generate update manifest
        working-directory: src
        run: dart run desktop_updater:release publish --platform linux --no-upload

      - name: Upload update manifest
        uses: actions/upload-artifact@v7
        with:
          name: linux-update-manifest
          path: src/dist/desktop_updater/
