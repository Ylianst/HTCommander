name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            deb_arch: amd64
            rpm_arch: x86_64
            appimagetool_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64
            appimagetool_arch: aarch64
    steps:
      - uses: actions/checkout@v7

      # Flutter publishes prebuilt SDK archives for x64 only, so the marketplace
      # action works for x64 but fails on arm64 ("Unable to determine Flutter
      # version ... architecture: arm64"). On arm64 we install from git, whose
      # bootstrap downloads the correct arm64 Dart SDK and engine on first run.
      - name: Set up Flutter (x64)
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Flutter (arm64)
        if: matrix.arch == 'arm64'
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch stable "$HOME/flutter"
          git config --global --add safe.directory "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version
          "$HOME/flutter/bin/flutter" precache --linux

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config cmake clang libserialport-dev libbluetooth-dev libpulse-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Linux
        working-directory: src
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd src/build/linux/${{ matrix.arch }}/release/bundle
          tar -czf "$GITHUB_WORKSPACE/htcommander-linux-${{ matrix.arch }}.tar.gz" .

      - name: Package .deb
        run: |
          PKG_DIR="htcommander-deb"
          VERSION="0.1.0"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/lib/htcommander"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"

          # Copy build output
          cp -r src/build/linux/${{ matrix.arch }}/release/bundle/* "$PKG_DIR/usr/lib/htcommander/"

          # Create symlink for PATH access
          ln -sf /usr/lib/htcommander/htcommander "$PKG_DIR/usr/bin/htcommander"

          # Desktop entry
          cat > "$PKG_DIR/usr/share/applications/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Comment[fr]=Outil de radio amateur pour UV-Pro, GA-5WB, VR-N76, VR-N7500 et radios compatibles
          Exec=/usr/bin/htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          # Remove leading spaces from heredoc
          sed -i 's/^          //' "$PKG_DIR/usr/share/applications/htcommander.desktop"

          # Icon
          cp src/assets/images/AppIcon.png "$PKG_DIR/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          # Control file
          cat > "$PKG_DIR/DEBIAN/control" <<EOF
          Package: htcommander
          Version: ${VERSION}
          Section: hamradio
          Priority: optional
          Architecture: ${{ matrix.deb_arch }}
          Depends: libgtk-3-0, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libbluetooth3, libserialport0, libpulse0
          Maintainer: HTCommander <htcommander@users.noreply.github.com>
          Description: Handi-Talky Commander
           Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76,
           VR-N7500 and compatible radios.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          dpkg-deb --build "$PKG_DIR" "htcommander-linux-${{ matrix.arch }}.deb"

      - name: Package .rpm
        run: |
          sudo apt-get install -y rpm
          VERSION="0.1.0"

          mkdir -p rpmbuild/SPECS
          STAGING="$GITHUB_WORKSPACE/rpm-staging"

          mkdir -p "$STAGING/usr/lib/htcommander"
          mkdir -p "$STAGING/usr/bin"
          mkdir -p "$STAGING/usr/share/applications"
          mkdir -p "$STAGING/usr/share/icons/hicolor/256x256/apps"

          cp -r src/build/linux/${{ matrix.arch }}/release/bundle/* "$STAGING/usr/lib/htcommander/"
          ln -sf /usr/lib/htcommander/htcommander "$STAGING/usr/bin/htcommander"
          cp src/assets/images/AppIcon.png "$STAGING/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          cat > "$STAGING/usr/share/applications/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Comment[fr]=Outil de radio amateur pour UV-Pro, GA-5WB, VR-N76, VR-N7500 et radios compatibles
          Exec=/usr/bin/htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$STAGING/usr/share/applications/htcommander.desktop"

          cat > rpmbuild/SPECS/htcommander.spec <<EOF
          Name: htcommander
          Version: ${VERSION}
          Release: 1
          Summary: Handi-Talky Commander
          License: MIT
          URL: https://github.com/ylianst/HTCommander
          AutoReqProv: no
          Requires: gtk3, gstreamer1, gstreamer1-plugins-base, bluez-libs

          %description
          Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76,
          VR-N7500 and compatible radios.

          %install
          cp -r %{_staging}/* %{buildroot}/

          %files
          /usr/lib/htcommander/
          /usr/bin/htcommander
          /usr/share/applications/htcommander.desktop
          /usr/share/icons/hicolor/256x256/apps/htcommander.png
          EOF
          sed -i 's/^          //' rpmbuild/SPECS/htcommander.spec

          rpmbuild -bb rpmbuild/SPECS/htcommander.spec \
            --define "_topdir $GITHUB_WORKSPACE/rpmbuild" \
            --define "_staging $GITHUB_WORKSPACE/rpm-staging"

          cp rpmbuild/RPMS/${{ matrix.rpm_arch }}/*.rpm htcommander-linux-${{ matrix.arch }}.rpm

      - name: Package AppImage
        run: |
          VERSION="0.1.0"
          APPDIR="HTCommander.AppDir"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # Copy build output
          cp -r src/build/linux/${{ matrix.arch }}/release/bundle/* "$APPDIR/usr/bin/"

          # Desktop file
          cat > "$APPDIR/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Comment[fr]=Outil de radio amateur pour UV-Pro, GA-5WB, VR-N76, VR-N7500 et radios compatibles
          Exec=htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$APPDIR/htcommander.desktop"
          cp "$APPDIR/htcommander.desktop" "$APPDIR/usr/share/applications/htcommander.desktop"

          # Icon
          cp src/assets/images/AppIcon.png "$APPDIR/htcommander.png"
          cp src/assets/images/AppIcon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          # AppRun script
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/htcommander" "$@"
          EOF
          sed -i 's/^          //' "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimagetool_arch }}.AppImage" -O appimagetool
          chmod +x appimagetool

          # Build AppImage
          ARCH=${{ matrix.appimagetool_arch }} ./appimagetool --no-appstream "$APPDIR" "htcommander-linux-${{ matrix.arch }}.AppImage"

      - name: Upload tar.gz
        uses: actions/upload-artifact@v7
        with:
          name: linux-tar-gz-${{ matrix.arch }}
          path: htcommander-linux-${{ matrix.arch }}.tar.gz

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb-${{ matrix.arch }}
          path: htcommander-linux-${{ matrix.arch }}.deb

      - name: Upload .rpm
        uses: actions/upload-artifact@v7
        with:
          name: linux-rpm-${{ matrix.arch }}
          path: htcommander-linux-${{ matrix.arch }}.rpm

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: htcommander-linux-${{ matrix.arch }}.AppImage

  # Experimental RISC-V (riscv64) build. GitHub Actions has no native RISC-V
  # runners, so we emulate a riscv64 Ubuntu container with QEMU and bootstrap
  # Flutter from git (same approach as arm64). This is a "does it build" probe:
  # it depends on Flutter publishing riscv64 Dart SDK/engine artifacts on the
  # stable channel, so it is allowed to fail without breaking the other builds.
  build-linux-riscv64:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Build Linux (riscv64, emulated)
        run: |
          docker run --rm --platform linux/riscv64 \
            -e DEBIAN_FRONTEND=noninteractive \
            -v "$GITHUB_WORKSPACE":/work -w /work \
            riscv64/ubuntu:24.04 \
            bash -c '
              set -eux
              apt-get update
              apt-get install -y --no-install-recommends \
                git curl ca-certificates unzip zip xz-utils file which sudo \
                ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config \
                cmake clang libserialport-dev libbluetooth-dev libpulse-dev \
                libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
              # RISC-V (riscv64) engine/Dart SDK artifacts are only published on
              # the master channel, so bootstrap from master instead of stable.
              git clone https://github.com/flutter/flutter.git --depth 1 --branch master /flutter
              git config --global --add safe.directory /flutter
              export PATH="/flutter/bin:$PATH"
              flutter --version
              flutter config --enable-linux-desktop
              flutter precache --linux
              cd src
              flutter pub get
              flutter build linux --release
            '

      - name: Package tar.gz
        run: |
          BUNDLE=$(find src/build/linux -type d -name bundle | head -n1)
          echo "Using bundle: $BUNDLE"
          cd "$BUNDLE"
          tar -czf "$GITHUB_WORKSPACE/htcommander-linux-riscv64.tar.gz" .

      - name: Upload tar.gz
        uses: actions/upload-artifact@v7
        with:
          name: linux-tar-gz-riscv64
          path: htcommander-linux-riscv64.tar.gz
