name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

env:
  BASE_URL: https://ylianst.github.io/HTCommander

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $version = $tag
          # Use build number from pubspec.yaml
          $pubspec = Get-Content src/pubspec.yaml -Raw
          if ($pubspec -match 'version:\s*[\d.]+\+(\d+)') {
            $buildNumber = $Matches[1]
          } else {
            $buildNumber = "1"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "build_number=$buildNumber" >> $env:GITHUB_OUTPUT
          echo "Version: $version, Build: $buildNumber"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Windows
        working-directory: src
        run: flutter build windows --release

      - name: Create MSI installer
        shell: pwsh
        run: |
          # Install WiX Toolset v5
          dotnet tool install --global wix --version 5.0.2

          $buildDir = "src\build\windows\x64\runner\Release"
          $appDisplayName = "Handi-Talky Commander"
          $appName = "HTCommander"
          $exeName = "htcommander.exe"
          $iconPath = "src\assets\images\AppIcon.png"
          $msiOutput = "HTCommander.msi"

          # Convert PNG to ICO using PowerShell
          Add-Type -AssemblyName System.Drawing
          $png = [System.Drawing.Image]::FromFile("$PWD\$iconPath")
          $icon = [System.Drawing.Icon]::FromHandle($png.GetHicon())
          $icoPath = "$PWD\app.ico"
          $fs = [System.IO.File]::Create($icoPath)
          $icon.Save($fs)
          $fs.Close()
          $icon.Dispose()
          $png.Dispose()

          # Build directory tree and file components
          $counter = 0
          $componentRefs = ""

          function Build-DirectoryXml($dirPath, $indent) {
            $xml = ""
            $script:counter++
            $files = Get-ChildItem -Path $dirPath -File
            foreach ($file in $files) {
              $script:counter++
              $fileId = "File$($script:counter)"
              $compId = "Comp$($script:counter)"
              $source = $file.FullName

              if ($file.Name -eq $exeName) {
                $xml += "$indent<Component Id='$compId' Guid='*'>`n"
                $xml += "$indent  <File Id='MainExe' Source='$source' KeyPath='yes' />`n"
                $xml += "$indent  <Shortcut Id='StartMenuShortcut' Directory='ProgramMenuFolder' Name='$appDisplayName' WorkingDirectory='INSTALLFOLDER' Icon='AppIcon' IconIndex='0' Advertise='yes' />`n"
                $xml += "$indent</Component>`n"
              } else {
                $xml += "$indent<Component Id='$compId' Guid='*'>`n"
                $xml += "$indent  <File Id='$fileId' Source='$source' KeyPath='yes' />`n"
                $xml += "$indent</Component>`n"
              }
              $script:componentRefs += "      <ComponentRef Id='$compId' />`n"
            }

            $subdirs = Get-ChildItem -Path $dirPath -Directory
            foreach ($subdir in $subdirs) {
              $script:counter++
              $dirId = "Dir$($script:counter)"
              $xml += "$indent<Directory Id='$dirId' Name='$($subdir.Name)'>`n"
              $xml += (Build-DirectoryXml $subdir.FullName "$indent  ")
              $xml += "$indent</Directory>`n"
            }
            return $xml
          }

          $directoryContent = Build-DirectoryXml $buildDir "          "

          $wxsContent = @"
          <?xml version='1.0' encoding='UTF-8'?>
          <Wix xmlns='http://wixtoolset.org/schemas/v4/wxs'>
            <Package Name='$appDisplayName'
                     Manufacturer='HTCommander'
                     Version='1.0.0.0'
                     UpgradeCode='6B29FC40-CA47-1067-B31D-00DD010662DA'
                     Platform='x64'>

              <MajorUpgrade DowngradeErrorMessage='A newer version of $appDisplayName is already installed.' />
              <MediaTemplate EmbedCab='yes' />

              <Icon Id='AppIcon' SourceFile='$icoPath' />
              <Property Id='ARPPRODUCTICON' Value='AppIcon' />
              <Property Id='ARPCOMMENTS' Value='Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios.' />

              <StandardDirectory Id='ProgramFiles6432Folder'>
                <Directory Id='INSTALLFOLDER' Name='$appName'>
          $directoryContent
                </Directory>
              </StandardDirectory>

              <Feature Id='MainFeature' Title='$appDisplayName' Level='1'>
          $componentRefs
              </Feature>
            </Package>
          </Wix>
          "@

          $wxsContent | Out-File -FilePath "installer.wxs" -Encoding UTF8

          # Build the MSI
          wix build installer.wxs -o $msiOutput

      - name: Generate update package
        shell: pwsh
        working-directory: src
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $buildNumber = "${{ steps.version.outputs.build_number }}"
          dart run desktop_updater:package `
            --input build/windows/x64/runner/Release `
            --output dist/desktop_updater/releases/$version/windows `
            --package-id com.htcommander.app `
            --app-name htcommander `
            --version $version `
            --build-number $buildNumber `
            --platform windows `
            --channel stable `
            --install-strategy wholeDirectoryReplace `
            --artifact-url "${{ env.BASE_URL }}/releases/$version/windows/htcommander-$version-windows.zip"

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: HTCommander.msi

      - name: Upload update package
        uses: actions/upload-artifact@v7
        with:
          name: windows-update
          path: src/dist/desktop_updater/releases/

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(grep '^version:' src/pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config cmake clang libserialport-dev libbluetooth-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Linux
        working-directory: src
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd src/build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/htcommander-linux-x64.tar.gz" .

      - name: Package .deb
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_DIR="htcommander-deb"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/lib/htcommander"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"

          cp -r src/build/linux/x64/release/bundle/* "$PKG_DIR/usr/lib/htcommander/"
          ln -sf /usr/lib/htcommander/htcommander "$PKG_DIR/usr/bin/htcommander"

          cat > "$PKG_DIR/usr/share/applications/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Exec=/usr/bin/htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$PKG_DIR/usr/share/applications/htcommander.desktop"

          cp src/assets/images/AppIcon.png "$PKG_DIR/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          cat > "$PKG_DIR/DEBIAN/control" <<EOF
          Package: htcommander
          Version: ${VERSION}
          Section: hamradio
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libbluetooth3, libserialport0
          Maintainer: HTCommander <htcommander@users.noreply.github.com>
          Description: Handi-Talky Commander
           Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76,
           VR-N7500 and compatible radios.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          dpkg-deb --build "$PKG_DIR" "htcommander-linux-x64.deb"

      - name: Package .rpm
        run: |
          sudo apt-get install -y rpm
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p rpmbuild/{SPECS,BUILDROOT}
          BUILDROOT="$GITHUB_WORKSPACE/rpmbuild/BUILDROOT"

          mkdir -p "$BUILDROOT/usr/lib/htcommander"
          mkdir -p "$BUILDROOT/usr/bin"
          mkdir -p "$BUILDROOT/usr/share/applications"
          mkdir -p "$BUILDROOT/usr/share/icons/hicolor/256x256/apps"

          cp -r src/build/linux/x64/release/bundle/* "$BUILDROOT/usr/lib/htcommander/"
          ln -sf /usr/lib/htcommander/htcommander "$BUILDROOT/usr/bin/htcommander"
          cp src/assets/images/AppIcon.png "$BUILDROOT/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          cat > "$BUILDROOT/usr/share/applications/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Exec=/usr/bin/htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$BUILDROOT/usr/share/applications/htcommander.desktop"

          cat > rpmbuild/SPECS/htcommander.spec <<EOF
          Name: htcommander
          Version: ${VERSION}
          Release: 1
          Summary: Handi-Talky Commander
          License: MIT
          URL: https://github.com/ylianst/HTCommander
          AutoReqProv: no
          Requires: gtk3, gstreamer1, gstreamer1-plugins-base, bluez-libs

          %description
          Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76,
          VR-N7500 and compatible radios.

          %install
          cp -r %{_topdir}/BUILDROOT/* %{buildroot}/

          %files
          /usr/lib/htcommander/
          /usr/bin/htcommander
          /usr/share/applications/htcommander.desktop
          /usr/share/icons/hicolor/256x256/apps/htcommander.png
          EOF
          sed -i 's/^          //' rpmbuild/SPECS/htcommander.spec

          rpmbuild -bb rpmbuild/SPECS/htcommander.spec \
            --define "_topdir $GITHUB_WORKSPACE/rpmbuild" \
            --buildroot "$BUILDROOT"

          cp rpmbuild/RPMS/x86_64/*.rpm htcommander-linux-x64.rpm

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            htcommander-linux-x64.tar.gz
            htcommander-linux-x64.deb
            htcommander-linux-x64.rpm

      - name: Generate update package
        working-directory: src
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          dart run desktop_updater:package \
            --input build/linux/x64/release/bundle \
            --output dist/desktop_updater/releases/$VERSION/linux \
            --package-id com.htcommander.app \
            --app-name htcommander \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform linux \
            --channel stable \
            --install-strategy wholeDirectoryReplace \
            --artifact-url "${{ env.BASE_URL }}/releases/$VERSION/linux/htcommander-$VERSION-linux.zip"

      - name: Upload update package
        uses: actions/upload-artifact@v7
        with:
          name: linux-update
          path: src/dist/desktop_updater/releases/

  build-macos:
    runs-on: macos-26
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(grep '^version:' src/pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build macOS
        working-directory: src
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH=$(find src/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_PATH")
          DMG_NAME="HTCommander.dmg"
          VOLUME_NAME="HTCommander"
          ICON_PATH="src/assets/images/AppIcon.png"
          STAGING_DIR="dmg_staging"

          echo "Found app: $APP_PATH"

          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          mkdir -p icon.iconset
          sips -z 512 512 "$ICON_PATH" --out icon.iconset/icon_256x256@2x.png
          sips -z 256 256 "$ICON_PATH" --out icon.iconset/icon_256x256.png
          sips -z 128 128 "$ICON_PATH" --out icon.iconset/icon_128x128.png
          iconutil -c icns icon.iconset -o VolumeIcon.icns

          hdiutil create -volname "$VOLUME_NAME" -srcfolder "$STAGING_DIR" -ov -format UDRW -fs HFS+ temp.dmg

          DEVICE=$(hdiutil attach -readwrite -noverify temp.dmg | grep '/Volumes/' | awk '{print $1}')
          MOUNT_POINT="/Volumes/$VOLUME_NAME"

          cp VolumeIcon.icns "$MOUNT_POINT/.VolumeIcon.icns"
          SetFile -a C "$MOUNT_POINT"

          osascript <<EOF
          tell application "Finder"
            tell disk "$VOLUME_NAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {200, 120, 800, 520}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 96
              set background color of theViewOptions to {60652, 60652, 63222}
              set position of item "$APP_NAME" of container window to {150, 180}
              set position of item "Applications" of container window to {450, 180}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          EOF

          sync
          hdiutil detach "$DEVICE"
          hdiutil convert temp.dmg -format UDZO -imagekey zlib-level=9 -o "$DMG_NAME"
          rm -f temp.dmg

      - name: Generate update package
        working-directory: src
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          dart run desktop_updater:package \
            --input "$APP_PATH" \
            --output dist/desktop_updater/releases/$VERSION/macos \
            --package-id com.htcommander.app \
            --app-name "$(basename "$APP_PATH")" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform macos \
            --channel stable \
            --install-strategy wholeBundleReplace \
            --artifact-url "${{ env.BASE_URL }}/releases/$VERSION/macos/htcommander-$VERSION-macos.zip"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: HTCommander.dmg

      - name: Upload update package
        uses: actions/upload-artifact@v7
        with:
          name: macos-update
          path: src/dist/desktop_updater/releases/

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Assemble update site
        working-directory: src
        run: |
          VERSION="${{ needs.build-windows.outputs.version }}"
          BUILD_NUMBER="${{ needs.build-windows.outputs.build_number }}"
          BASE_URL="${{ env.BASE_URL }}"

          # Create output directory structure
          mkdir -p dist/desktop_updater/releases

          # Copy all platform release artifacts
          cp -r ../artifacts/windows-update/* dist/desktop_updater/releases/ || true
          cp -r ../artifacts/linux-update/* dist/desktop_updater/releases/ || true
          cp -r ../artifacts/macos-update/* dist/desktop_updater/releases/ || true

          # Generate the combined app-archive.json with all platforms
          dart run desktop_updater:app_archive upsert \
            --archive dist/desktop_updater/app-archive.json \
            --app-name "Handi-Talkie Commander" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform windows \
            --channel stable \
            --release-url "$BASE_URL/releases/$VERSION/windows/release.json"

          dart run desktop_updater:app_archive upsert \
            --archive dist/desktop_updater/app-archive.json \
            --app-name "Handi-Talkie Commander" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform linux \
            --channel stable \
            --release-url "$BASE_URL/releases/$VERSION/linux/release.json"

          dart run desktop_updater:app_archive upsert \
            --archive dist/desktop_updater/app-archive.json \
            --app-name "Handi-Talkie Commander" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform macos \
            --channel stable \
            --release-url "$BASE_URL/releases/$VERSION/macos/release.json"

          echo "=== app-archive.json ==="
          cat dist/desktop_updater/app-archive.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HTCommander ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/windows-msi/HTCommander.msi
            artifacts/macos-dmg/HTCommander.dmg
            artifacts/linux-packages/htcommander-linux-x64.tar.gz
            artifacts/linux-packages/htcommander-linux-x64.deb
            artifacts/linux-packages/htcommander-linux-x64.rpm

      - name: Deploy update site to docs folder
        run: |
          cp -r src/dist/desktop_updater/* docs/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/app-archive.json docs/releases/
          git commit -m "Update desktop_updater artifacts for ${{ needs.build-windows.outputs.version }}" || echo "No changes to commit"
          git push
