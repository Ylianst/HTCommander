name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

env:
  BASE_URL: https://ylianst.github.io/HTCommander

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $version = $tag
          # Use build number from pubspec.yaml
          $pubspec = Get-Content src/pubspec.yaml -Raw
          if ($pubspec -match 'version:\s*[\d.]+\+(\d+)') {
            $buildNumber = $Matches[1]
          } else {
            $buildNumber = "1"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "build_number=$buildNumber" >> $env:GITHUB_OUTPUT
          echo "Version: $version, Build: $buildNumber"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Windows
        working-directory: src
        run: flutter build windows --release

      - name: Sign Windows executable
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: src\build\windows\x64\runner\Release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Create MSI installer
        shell: pwsh
        run: |
          # Install WiX Toolset v5
          dotnet tool install --global wix --version 5.0.2

          # Register the WiX UI extension so 'wix build -ext' can resolve it
          wix extension add -g WixToolset.UI.wixext/5.0.2

          $buildDir = "src\build\windows\x64\runner\Release"
          $appDisplayName = "Handi-Talky Commander"
          $appName = "HTCommander"
          $exeName = "htcommander.exe"
          $icoPath = (Resolve-Path "src\htcommander.ico").Path
          $licenseRtf = (Resolve-Path "src\windows\LICENSE.rtf").Path
          $dialogBmp = (Resolve-Path "src\windows\background.bmp").Path
          $bannerBmp = (Resolve-Path "src\windows\banner.bmp").Path
          $msiOutput = "HTCommander.msi"

          # Verify icon file exists
          if (-not (Test-Path $icoPath)) { Write-Error "Icon not found: $icoPath"; exit 1 }
          Write-Output "Using icon: $icoPath"

          # Build directory tree and file components
          $counter = 0
          $componentRefs = ""

          function Build-DirectoryXml($dirPath, $indent) {
            $xml = ""
            $script:counter++
            $files = Get-ChildItem -Path $dirPath -File
            foreach ($file in $files) {
              $script:counter++
              $fileId = "File$($script:counter)"
              $compId = "Comp$($script:counter)"
              $source = $file.FullName

              if ($file.Name -eq $exeName) {
                $xml += "$indent<Component Id='$compId' Guid='*'>`n"
                $xml += "$indent  <File Id='MainExe' Source='$source' KeyPath='yes' />`n"
                  $xml += "$indent  <Shortcut Id='StartMenuShortcut' Directory='ProgramMenuFolder' Name='$appDisplayName' Target='[#MainExe]' WorkingDirectory='INSTALLFOLDER' Icon='AppIcon' IconIndex='0' />`n"
                $xml += "$indent</Component>`n"
              } else {
                $xml += "$indent<Component Id='$compId' Guid='*'>`n"
                $xml += "$indent  <File Id='$fileId' Source='$source' KeyPath='yes' />`n"
                $xml += "$indent</Component>`n"
              }
              $script:componentRefs += "      <ComponentRef Id='$compId' />`n"
            }

            $subdirs = Get-ChildItem -Path $dirPath -Directory
            foreach ($subdir in $subdirs) {
              $script:counter++
              $dirId = "Dir$($script:counter)"
              $xml += "$indent<Directory Id='$dirId' Name='$($subdir.Name)'>`n"
              $xml += (Build-DirectoryXml $subdir.FullName "$indent  ")
              $xml += "$indent</Directory>`n"
            }
            return $xml
          }

          $directoryContent = Build-DirectoryXml $buildDir "          "

          $wxsContent = @"
          <?xml version='1.0' encoding='UTF-8'?>
          <Wix xmlns='http://wixtoolset.org/schemas/v4/wxs'
               xmlns:ui='http://wixtoolset.org/schemas/v4/wxs/ui'>
            <Package Name='$appDisplayName'
                     Manufacturer='HTCommander'
                     Version='1.0.0.0'
                     UpgradeCode='6B29FC40-CA47-1067-B31D-00DD010662DA'>

              <MajorUpgrade DowngradeErrorMessage='A newer version of $appDisplayName is already installed.' />
              <MediaTemplate EmbedCab='yes' />
              <ui:WixUI Id='WixUI_InstallDir' InstallDirectory='INSTALLFOLDER' />
              <WixVariable Id='WixUILicenseRtf' Value='$licenseRtf' />
              <WixVariable Id='WixUIDialogBmp' Value='$dialogBmp' />
              <WixVariable Id='WixUIBannerBmp' Value='$bannerBmp' />

              <Icon Id='AppIcon' SourceFile='$icoPath' />
              <Property Id='ARPPRODUCTICON' Value='AppIcon' />
              <Property Id='ARPCOMMENTS' Value='Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios.' />

              <StandardDirectory Id='ProgramFiles6432Folder'>
                <Directory Id='INSTALLFOLDER' Name='$appName'>
          $directoryContent
                </Directory>
              </StandardDirectory>

              <Feature Id='MainFeature' Title='$appDisplayName' Level='1'>
          $componentRefs
              </Feature>
            </Package>
          </Wix>
          "@

          $wxsContent | Out-File -FilePath "installer.wxs" -Encoding UTF8

          # Build the MSI
          wix build installer.wxs -ext WixToolset.UI.wixext -arch x64 -o $msiOutput

      - name: Sign MSI installer
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Generate update package
        shell: pwsh
        working-directory: src
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $buildNumber = "${{ steps.version.outputs.build_number }}"
          dart run desktop_updater:package `
            --input build/windows/x64/runner/Release `
            --output dist/desktop_updater/releases/$version/windows `
            --package-id com.htcommander.app `
            --app-name htcommander `
            --version $version `
            --build-number $buildNumber `
            --platform windows `
            --channel stable `
            --install-strategy wholeDirectoryReplace `
            --artifact-url "${{ env.BASE_URL }}/releases/$version/windows/htcommander-$version-windows.zip"

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: HTCommander.msi

      - name: Upload update package
        uses: actions/upload-artifact@v7
        with:
          name: windows-update
          path: src/dist/desktop_updater/releases/

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(grep '^version:' src/pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config cmake clang libserialport-dev libbluetooth-dev libpulse-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Linux
        working-directory: src
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd src/build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/htcommander-linux-x64.tar.gz" .

      - name: Package .deb
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_DIR="htcommander-deb"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/lib/htcommander"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"

          cp -r src/build/linux/x64/release/bundle/* "$PKG_DIR/usr/lib/htcommander/"
          ln -sf /usr/lib/htcommander/htcommander "$PKG_DIR/usr/bin/htcommander"

          cat > "$PKG_DIR/usr/share/applications/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Exec=/usr/bin/htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$PKG_DIR/usr/share/applications/htcommander.desktop"

          cp src/assets/images/AppIcon.png "$PKG_DIR/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          cat > "$PKG_DIR/DEBIAN/control" <<EOF
          Package: htcommander
          Version: ${VERSION}
          Section: hamradio
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0, libbluetooth3, libserialport0, libpulse0
          Maintainer: HTCommander <htcommander@users.noreply.github.com>
          Description: Handi-Talky Commander
           Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76,
           VR-N7500 and compatible radios.
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          dpkg-deb --build "$PKG_DIR" "htcommander-linux-x64.deb"

      - name: Package .rpm
        run: |
          sudo apt-get install -y rpm
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p rpmbuild/{SPECS,STAGING}
          STAGING="$GITHUB_WORKSPACE/rpmbuild/STAGING"

          mkdir -p "$STAGING/usr/lib/htcommander"
          mkdir -p "$STAGING/usr/bin"
          mkdir -p "$STAGING/usr/share/applications"
          mkdir -p "$STAGING/usr/share/icons/hicolor/256x256/apps"

          cp -r src/build/linux/x64/release/bundle/* "$STAGING/usr/lib/htcommander/"
          ln -sf /usr/lib/htcommander/htcommander "$STAGING/usr/bin/htcommander"
          cp src/assets/images/AppIcon.png "$STAGING/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          cat > "$STAGING/usr/share/applications/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Exec=/usr/bin/htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$STAGING/usr/share/applications/htcommander.desktop"

          cat > rpmbuild/SPECS/htcommander.spec <<EOF
          Name: htcommander
          Version: ${VERSION}
          Release: 1
          Summary: Handi-Talky Commander
          License: MIT
          URL: https://github.com/ylianst/HTCommander
          AutoReqProv: no
          Requires: gtk3, gstreamer1, gstreamer1-plugins-base, bluez-libs

          %description
          Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76,
          VR-N7500 and compatible radios.

          %install
          cp -r %{_topdir}/STAGING/* %{buildroot}/

          %files
          /usr/lib/htcommander/
          /usr/bin/htcommander
          /usr/share/applications/htcommander.desktop
          /usr/share/icons/hicolor/256x256/apps/htcommander.png
          EOF
          sed -i 's/^          //' rpmbuild/SPECS/htcommander.spec

          rpmbuild -bb rpmbuild/SPECS/htcommander.spec \
            --define "_topdir $GITHUB_WORKSPACE/rpmbuild"

          cp rpmbuild/RPMS/x86_64/*.rpm htcommander-linux-x64.rpm

      - name: Package AppImage
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APPDIR="HTCommander.AppDir"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # Copy build output
          cp -r src/build/linux/x64/release/bundle/* "$APPDIR/usr/bin/"

          # Desktop file
          cat > "$APPDIR/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Exec=htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$APPDIR/htcommander.desktop"
          cp "$APPDIR/htcommander.desktop" "$APPDIR/usr/share/applications/htcommander.desktop"

          # Icon
          cp src/assets/images/AppIcon.png "$APPDIR/htcommander.png"
          cp src/assets/images/AppIcon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          # AppRun script
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/htcommander" "$@"
          EOF
          sed -i 's/^          //' "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Build AppImage
          ARCH=x86_64 ./appimagetool --no-appstream "$APPDIR" "htcommander-linux-x64.AppImage"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            htcommander-linux-x64.tar.gz
            htcommander-linux-x64.deb
            htcommander-linux-x64.rpm
            htcommander-linux-x64.AppImage

      - name: Generate update package
        working-directory: src
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          dart run desktop_updater:package \
            --input build/linux/x64/release/bundle \
            --output dist/desktop_updater/releases/$VERSION/linux \
            --package-id com.htcommander.app \
            --app-name htcommander \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform linux \
            --channel stable \
            --install-strategy wholeDirectoryReplace \
            --artifact-url "${{ env.BASE_URL }}/releases/$VERSION/linux/htcommander-$VERSION-linux.zip"

      - name: Upload update package
        uses: actions/upload-artifact@v7
        with:
          name: linux-update
          path: src/dist/desktop_updater/releases/

  build-macos:
    runs-on: macos-26
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(grep '^version:' src/pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build macOS (unsigned)
        working-directory: src
        run: |
          # CI can't use Xcode automatic signing (no "Mac Development" cert),
          # so build unsigned here and sign with Developer ID + notarize below.
          sed -i '' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/DEVELOPMENT_TEAM = CQ575Z873Y;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development";/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "";/g' \
            macos/Runner.xcodeproj/project.pbxproj
          {
            echo 'CODE_SIGN_IDENTITY='
            echo 'CODE_SIGNING_REQUIRED=NO'
            echo 'CODE_SIGNING_ALLOWED=NO'
          } >> macos/Runner/Configs/Release.xcconfig
          flutter build macos --release

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Decode the Developer ID Application certificate (.p12)
          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create a temporary keychain and import the certificate
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Sign and notarize app
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          APP_PATH=$(find src/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "Signing $APP_PATH"

          # Sign nested code first (inside-out), then the app bundle itself
          find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --force --timestamp --options runtime --sign "$MACOS_SIGNING_IDENTITY" {} +
          find "$APP_PATH/Contents/Frameworks" -type d -name "*.framework" -exec \
            codesign --force --timestamp --options runtime --sign "$MACOS_SIGNING_IDENTITY" {} +

          # Sign the app bundle last with hardened runtime + entitlements
          codesign --force --timestamp --options runtime \
            --entitlements src/macos/Runner/Release.entitlements \
            --sign "$MACOS_SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          # Notarize the app, then staple the ticket so both the DMG and the
          # auto-updater package below contain a fully trusted bundle
          NOTARY_KEY="$RUNNER_TEMP/notary_key.p8"
          echo -n "$MACOS_NOTARY_KEY_BASE64" | base64 --decode -o "$NOTARY_KEY"
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/notarize.zip"
          # Retry to survive transient Apple notary service timeouts (-1001)
          for attempt in 1 2 3 4 5; do
            if xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
              --key "$NOTARY_KEY" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait; then
              break
            fi
            if [ "$attempt" = 5 ]; then echo "Notarization failed after 5 attempts"; exit 1; fi
            echo "notarytool attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH=$(find src/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_PATH")
          DMG_NAME="HTCommander.dmg"
          VOLUME_NAME="HTCommander"
          ICON_PATH="src/assets/images/AppIcon.png"
          STAGING_DIR="dmg_staging"

          echo "Found app: $APP_PATH"

          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          mkdir -p icon.iconset
          sips -z 512 512 "$ICON_PATH" --out icon.iconset/icon_256x256@2x.png
          sips -z 256 256 "$ICON_PATH" --out icon.iconset/icon_256x256.png
          sips -z 128 128 "$ICON_PATH" --out icon.iconset/icon_128x128.png
          iconutil -c icns icon.iconset -o VolumeIcon.icns

          hdiutil create -volname "$VOLUME_NAME" -srcfolder "$STAGING_DIR" -ov -format UDRW -fs HFS+ temp.dmg

          DEVICE=$(hdiutil attach -readwrite -noverify temp.dmg | grep '/Volumes/' | awk '{print $1}')
          MOUNT_POINT="/Volumes/$VOLUME_NAME"

          cp VolumeIcon.icns "$MOUNT_POINT/.VolumeIcon.icns"
          SetFile -a C "$MOUNT_POINT"

          osascript <<EOF
          tell application "Finder"
            tell disk "$VOLUME_NAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {200, 120, 800, 520}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 96
              set background color of theViewOptions to {60652, 60652, 63222}
              set position of item "$APP_NAME" of container window to {150, 180}
              set position of item "Applications" of container window to {450, 180}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          EOF

          sync
          hdiutil detach "$DEVICE"
          hdiutil convert temp.dmg -format UDZO -imagekey zlib-level=9 -o "$DMG_NAME"
          rm -f temp.dmg

      - name: Notarize and staple DMG
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          for attempt in 1 2 3 4 5; do
            if xcrun notarytool submit HTCommander.dmg \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait; then
              break
            fi
            if [ "$attempt" = 5 ]; then echo "DMG notarization failed after 5 attempts"; exit 1; fi
            echo "notarytool attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          xcrun stapler staple HTCommander.dmg

      - name: Generate update package
        working-directory: src
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          dart run desktop_updater:package \
            --input "$APP_PATH" \
            --output dist/desktop_updater/releases/$VERSION/macos \
            --package-id com.htcommander.app \
            --app-name "$(basename "$APP_PATH")" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform macos \
            --channel stable \
            --install-strategy wholeBundleReplace \
            --artifact-url "${{ env.BASE_URL }}/releases/$VERSION/macos/htcommander-$VERSION-macos.zip"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: HTCommander.dmg

      - name: Upload update package
        uses: actions/upload-artifact@v7
        with:
          name: macos-update
          path: src/dist/desktop_updater/releases/

  build-android:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(grep '^version:' src/pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode Android keystore
        working-directory: src/android/app
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > upload-keystore.jks

      - name: Create key.properties
        working-directory: src/android
        run: |
          cat > key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build signed Android APK
        working-directory: src
        run: flutter build apk --release

      - name: Build signed Android App Bundle
        working-directory: src
        run: flutter build appbundle --release

      - name: Rename artifacts
        working-directory: src
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp build/app/outputs/flutter-apk/app-release.apk "$GITHUB_WORKSPACE/HTCommander.apk"
          cp build/app/outputs/bundle/release/app-release.aab "$GITHUB_WORKSPACE/htcommander-$VERSION.aab"

      - name: Clean up signing secrets
        if: always()
        working-directory: src/android
        run: rm -f key.properties app/upload-keystore.jks

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: HTCommander.apk

      - name: Upload Android AAB
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: htcommander-*.aab

  release:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Assemble update site
        working-directory: src
        run: |
          VERSION="${{ needs.build-windows.outputs.version }}"
          BUILD_NUMBER="${{ needs.build-windows.outputs.build_number }}"
          BASE_URL="${{ env.BASE_URL }}"

          # Create output directory structure
          mkdir -p dist/desktop_updater/releases

          # Copy all platform release artifacts
          cp -r ../artifacts/windows-update/* dist/desktop_updater/releases/ || true
          cp -r ../artifacts/linux-update/* dist/desktop_updater/releases/ || true
          cp -r ../artifacts/macos-update/* dist/desktop_updater/releases/ || true

          # Generate the combined app-archive.json with all platforms
          dart run desktop_updater:app_archive upsert \
            --archive dist/desktop_updater/app-archive.json \
            --app-name "Handi-Talkie Commander" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform windows \
            --channel stable \
            --release-url "$BASE_URL/releases/$VERSION/windows/release.json"

          dart run desktop_updater:app_archive upsert \
            --archive dist/desktop_updater/app-archive.json \
            --app-name "Handi-Talkie Commander" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform linux \
            --channel stable \
            --release-url "$BASE_URL/releases/$VERSION/linux/release.json"

          dart run desktop_updater:app_archive upsert \
            --archive dist/desktop_updater/app-archive.json \
            --app-name "Handi-Talkie Commander" \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --platform macos \
            --channel stable \
            --release-url "$BASE_URL/releases/$VERSION/macos/release.json"

          echo "=== app-archive.json ==="
          cat dist/desktop_updater/app-archive.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HTCommander ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/windows-msi/HTCommander.msi
            artifacts/macos-dmg/HTCommander.dmg
            artifacts/linux-packages/htcommander-linux-x64.tar.gz
            artifacts/linux-packages/htcommander-linux-x64.deb
            artifacts/linux-packages/htcommander-linux-x64.rpm
            artifacts/linux-packages/htcommander-linux-x64.AppImage
            artifacts/android-apk/HTCommander.apk
            artifacts/android-aab/htcommander-*.aab

      - name: Deploy update site to docs folder
        run: |
          cp -r src/dist/desktop_updater/* docs/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/app-archive.json docs/releases/
          git commit -m "Update desktop_updater artifacts for ${{ needs.build-windows.outputs.version }}" || echo "No changes to commit"
          git push
