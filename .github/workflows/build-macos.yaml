name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build macOS (unsigned)
        working-directory: src
        run: |
          # CI can't use Xcode automatic signing (no "Mac Development" cert),
          # so build unsigned here and sign with Developer ID + notarize below.
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' macos/Runner.xcodeproj/project.pbxproj
          {
            echo 'CODE_SIGN_IDENTITY='
            echo 'CODE_SIGNING_REQUIRED=NO'
            echo 'CODE_SIGNING_ALLOWED=NO'
          } >> macos/Runner/Configs/Release.xcconfig
          flutter build macos --release

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Decode the Developer ID Application certificate (.p12)
          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create a temporary keychain and import the certificate
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Sign and notarize app
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          APP_PATH=$(find src/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "Signing $APP_PATH"

          # Sign nested code first (inside-out), then the app bundle itself
          find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --force --timestamp --options runtime --sign "$MACOS_SIGNING_IDENTITY" {} +
          find "$APP_PATH/Contents/Frameworks" -type d -name "*.framework" -exec \
            codesign --force --timestamp --options runtime --sign "$MACOS_SIGNING_IDENTITY" {} +

          # Sign the app bundle last with hardened runtime + entitlements
          codesign --force --timestamp --options runtime \
            --entitlements src/macos/Runner/Release.entitlements \
            --sign "$MACOS_SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          # Notarize the app, then staple the ticket to the bundle
          NOTARY_KEY="$RUNNER_TEMP/notary_key.p8"
          echo -n "$MACOS_NOTARY_KEY_BASE64" | base64 --decode -o "$NOTARY_KEY"
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$NOTARY_KEY" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          # Find the .app bundle (name comes from Xcode PRODUCT_NAME)
          APP_PATH=$(find src/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_PATH")
          DMG_NAME="HTCommander.dmg"
          VOLUME_NAME="HTCommander"
          ICON_PATH="src/assets/images/AppIcon.png"
          STAGING_DIR="dmg_staging"

          echo "Found app: $APP_PATH"

          # Create staging directory with app and Applications symlink
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          # Convert PNG icon to icns for the DMG volume
          mkdir -p icon.iconset
          sips -z 512 512 "$ICON_PATH" --out icon.iconset/icon_256x256@2x.png
          sips -z 256 256 "$ICON_PATH" --out icon.iconset/icon_256x256.png
          sips -z 128 128 "$ICON_PATH" --out icon.iconset/icon_128x128.png
          iconutil -c icns icon.iconset -o VolumeIcon.icns

          # Create initial DMG
          hdiutil create -volname "$VOLUME_NAME" -srcfolder "$STAGING_DIR" -ov -format UDRW -fs HFS+ temp.dmg

          # Mount and customize
          DEVICE=$(hdiutil attach -readwrite -noverify temp.dmg | grep '/Volumes/' | awk '{print $1}')
          MOUNT_POINT="/Volumes/$VOLUME_NAME"

          # Set volume icon
          cp VolumeIcon.icns "$MOUNT_POINT/.VolumeIcon.icns"
          SetFile -a C "$MOUNT_POINT"

          # Use AppleScript to set DMG window appearance
          osascript <<EOF
          tell application "Finder"
            tell disk "$VOLUME_NAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {200, 120, 800, 520}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 96
              set background color of theViewOptions to {60652, 60652, 63222}
              set position of item "$APP_NAME" of container window to {150, 180}
              set position of item "Applications" of container window to {450, 180}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          EOF

          # Unmount
          sync
          hdiutil detach "$DEVICE"

          # Convert to compressed read-only DMG
          hdiutil convert temp.dmg -format UDZO -imagekey zlib-level=9 -o "$DMG_NAME"
          rm -f temp.dmg

      - name: Notarize and staple DMG
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          xcrun notarytool submit HTCommander.dmg \
            --key "$RUNNER_TEMP/notary_key.p8" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple HTCommander.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: HTCommander.dmg
