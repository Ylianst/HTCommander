name: Build All Platforms

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Windows
        working-directory: src
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: src/build/windows/x64/runner/Release/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config cmake clang libserialport-dev libbluetooth-dev

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Linux
        working-directory: src
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: src/build/linux/x64/release/bundle/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build macOS
        working-directory: src
        run: flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: src/build/macos/Build/Products/Release/*.app

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build iOS
        working-directory: src
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: src/build/ios/iphoneos/Runner.app

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Android APK
        working-directory: src
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-build
          path: src/build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Web
        working-directory: src
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: src/build/web/
