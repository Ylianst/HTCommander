name: Build All Platforms

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            wix_arch: x64
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Windows
        working-directory: src
        run: flutter build windows --release

      - name: Sign Windows executable
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: src\build\windows\${{ matrix.arch }}\runner\Release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Create MSI installer
        shell: pwsh
        run: |
          # Install WiX Toolset v5
          dotnet tool install --global wix --version 5.0.2

          # Register the WiX UI extension so 'wix build -ext' can resolve it
          wix extension add -g WixToolset.UI.wixext/5.0.2

          $buildDir = "src\build\windows\${{ matrix.arch }}\runner\Release"
          $appDisplayName = "Handi-Talky Commander"
          $appName = "HTCommander"
          $exeName = "htcommander.exe"
          $icoPath = (Resolve-Path "src\htcommander.ico").Path
          $licenseRtf = (Resolve-Path "src\windows\LICENSE.rtf").Path
          $dialogBmp = (Resolve-Path "src\windows\background.bmp").Path
          $bannerBmp = (Resolve-Path "src\windows\banner.bmp").Path
          $msiOutput = "HTCommander-${{ matrix.arch }}.msi"

          # Verify icon file exists
          if (-not (Test-Path $icoPath)) { Write-Error "Icon not found: $icoPath"; exit 1 }
          Write-Output "Using icon: $icoPath"

          # Build directory tree and file components
          $counter = 0
          $componentRefs = ""

          function Build-DirectoryXml($dirPath, $indent) {
            $xml = ""
            $script:counter++
            $files = Get-ChildItem -Path $dirPath -File
            foreach ($file in $files) {
              $script:counter++
              $fileId = "File$($script:counter)"
              $compId = "Comp$($script:counter)"
              $source = $file.FullName

              if ($file.Name -eq $exeName) {
                # Main exe component - include shortcut
                $xml += "$indent<Component Id='$compId' Guid='*'>`n"
                $xml += "$indent  <File Id='MainExe' Source='$source' KeyPath='yes' />`n"
                  $xml += "$indent  <Shortcut Id='StartMenuShortcut' Directory='ProgramMenuFolder' Name='$appDisplayName' Target='[#MainExe]' WorkingDirectory='INSTALLFOLDER' Icon='AppIcon' IconIndex='0' />`n"
                $xml += "$indent</Component>`n"
              } else {
                $xml += "$indent<Component Id='$compId' Guid='*'>`n"
                $xml += "$indent  <File Id='$fileId' Source='$source' KeyPath='yes' />`n"
                $xml += "$indent</Component>`n"
              }
              $script:componentRefs += "      <ComponentRef Id='$compId' />`n"
            }

            $subdirs = Get-ChildItem -Path $dirPath -Directory
            foreach ($subdir in $subdirs) {
              $script:counter++
              $dirId = "Dir$($script:counter)"
              $xml += "$indent<Directory Id='$dirId' Name='$($subdir.Name)'>`n"
              $xml += (Build-DirectoryXml $subdir.FullName "$indent  ")
              $xml += "$indent</Directory>`n"
            }
            return $xml
          }

          $directoryContent = Build-DirectoryXml $buildDir "          "

          $wxsContent = @"
          <?xml version='1.0' encoding='UTF-8'?>
          <Wix xmlns='http://wixtoolset.org/schemas/v4/wxs'
               xmlns:ui='http://wixtoolset.org/schemas/v4/wxs/ui'>
            <Package Name='$appDisplayName'
                     Manufacturer='HTCommander'
                     Version='1.0.0.0'
                     UpgradeCode='6B29FC40-CA47-1067-B31D-00DD010662DA'>

              <MajorUpgrade DowngradeErrorMessage='A newer version of $appDisplayName is already installed.' />
              <MediaTemplate EmbedCab='yes' />
              <ui:WixUI Id='WixUI_InstallDir' InstallDirectory='INSTALLFOLDER' />
              <WixVariable Id='WixUILicenseRtf' Value='$licenseRtf' />
              <WixVariable Id='WixUIDialogBmp' Value='$dialogBmp' />
              <WixVariable Id='WixUIBannerBmp' Value='$bannerBmp' />

              <Icon Id='AppIcon' SourceFile='$icoPath' />
              <Property Id='ARPPRODUCTICON' Value='AppIcon' />
              <Property Id='ARPCOMMENTS' Value='Amateur Radio (HAM Radio) tool for the UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios.' />

              <StandardDirectory Id='ProgramFiles6432Folder'>
                <Directory Id='INSTALLFOLDER' Name='$appName'>
          $directoryContent
                </Directory>
              </StandardDirectory>

              <Feature Id='MainFeature' Title='$appDisplayName' Level='1'>
          $componentRefs
              </Feature>
            </Package>
          </Wix>
          "@

          $wxsContent | Out-File -FilePath "installer.wxs" -Encoding UTF8

          # Build the MSI
          wix build installer.wxs -ext WixToolset.UI.wixext -arch ${{ matrix.wix_arch }} -o $msiOutput

      - name: Sign MSI installer
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-${{ matrix.arch }}
          path: HTCommander-${{ matrix.arch }}.msi

  build-linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            appimagetool_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            appimagetool_arch: aarch64
    steps:
      - uses: actions/checkout@v7

      # Flutter publishes prebuilt SDK archives for x64 only, so the marketplace
      # action works for x64 but fails on arm64 ("Unable to determine Flutter
      # version ... architecture: arm64"). On arm64 we install from git, whose
      # bootstrap downloads the correct arm64 Dart SDK and engine on first run.
      - name: Set up Flutter (x64)
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Flutter (arm64)
        if: matrix.arch == 'arm64'
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch stable "$HOME/flutter"
          git config --global --add safe.directory "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version
          "$HOME/flutter/bin/flutter" precache --linux

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config cmake clang libserialport-dev libbluetooth-dev libpulse-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Linux
        working-directory: src
        run: flutter build linux --release

      - name: Package AppImage
        run: |
          APPDIR="HTCommander.AppDir"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # Copy build output
          cp -r src/build/linux/${{ matrix.arch }}/release/bundle/* "$APPDIR/usr/bin/"

          # Desktop file
          cat > "$APPDIR/htcommander.desktop" <<EOF
          [Desktop Entry]
          Name=HTCommander
          Comment=Amateur Radio tool for UV-Pro, GA-5WB, VR-N76, VR-N7500 and compatible radios
          Exec=htcommander
          Icon=htcommander
          Type=Application
          Categories=Utility;HamRadio;
          Terminal=false
          EOF
          sed -i 's/^          //' "$APPDIR/htcommander.desktop"
          cp "$APPDIR/htcommander.desktop" "$APPDIR/usr/share/applications/htcommander.desktop"

          # Icon
          cp src/assets/images/AppIcon.png "$APPDIR/htcommander.png"
          cp src/assets/images/AppIcon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png"

          # AppRun script
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/htcommander" "$@"
          EOF
          sed -i 's/^          //' "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimagetool_arch }}.AppImage" -O appimagetool
          chmod +x appimagetool

          # Build AppImage
          ARCH=${{ matrix.appimagetool_arch }} ./appimagetool --no-appstream "$APPDIR" "htcommander-linux-${{ matrix.arch }}.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-build-${{ matrix.arch }}
          path: src/build/linux/${{ matrix.arch }}/release/bundle/

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: htcommander-linux-${{ matrix.arch }}.AppImage

  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build macOS (unsigned)
        working-directory: src
        run: |
          # CI can't use Xcode automatic signing (no "Mac Development" cert),
          # so build unsigned here and sign with Developer ID + notarize below.
          sed -i '' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/DEVELOPMENT_TEAM = CQ575Z873Y;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development";/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "";/g' \
            macos/Runner.xcodeproj/project.pbxproj
          {
            echo 'CODE_SIGN_IDENTITY='
            echo 'CODE_SIGNING_REQUIRED=NO'
            echo 'CODE_SIGNING_ALLOWED=NO'
          } >> macos/Runner/Configs/Release.xcconfig
          flutter build macos --release

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Decode the Developer ID Application certificate (.p12)
          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create a temporary keychain and import the certificate
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Sign and notarize app
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          APP_PATH=$(find src/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "Signing $APP_PATH"

          # Sign nested code first (inside-out), then the app bundle itself
          find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --force --timestamp --options runtime --sign "$MACOS_SIGNING_IDENTITY" {} +
          find "$APP_PATH/Contents/Frameworks" -type d -name "*.framework" -exec \
            codesign --force --timestamp --options runtime --sign "$MACOS_SIGNING_IDENTITY" {} +

          # Sign the app bundle last with hardened runtime + entitlements
          codesign --force --timestamp --options runtime \
            --entitlements src/macos/Runner/Release.entitlements \
            --sign "$MACOS_SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          # Notarize the app, then staple the ticket to the bundle
          NOTARY_KEY="$RUNNER_TEMP/notary_key.p8"
          echo -n "$MACOS_NOTARY_KEY_BASE64" | base64 --decode -o "$NOTARY_KEY"
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/notarize.zip"
          # Retry to survive transient Apple notary service timeouts (-1001)
          for attempt in 1 2 3 4 5; do
            if xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
              --key "$NOTARY_KEY" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait; then
              break
            fi
            if [ "$attempt" = 5 ]; then echo "Notarization failed after 5 attempts"; exit 1; fi
            echo "notarytool attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          # Find the .app bundle (name comes from Xcode PRODUCT_NAME)
          APP_PATH=$(find src/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_PATH")
          DMG_NAME="HTCommander.dmg"
          VOLUME_NAME="HTCommander"
          ICON_PATH="src/assets/images/AppIcon.png"
          STAGING_DIR="dmg_staging"

          echo "Found app: $APP_PATH"

          # Create staging directory with app and Applications symlink
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          # Convert PNG icon to icns for the DMG volume
          mkdir -p icon.iconset
          sips -z 512 512 "$ICON_PATH" --out icon.iconset/icon_256x256@2x.png
          sips -z 256 256 "$ICON_PATH" --out icon.iconset/icon_256x256.png
          sips -z 128 128 "$ICON_PATH" --out icon.iconset/icon_128x128.png
          iconutil -c icns icon.iconset -o VolumeIcon.icns

          # Create initial DMG
          hdiutil create -volname "$VOLUME_NAME" -srcfolder "$STAGING_DIR" -ov -format UDRW -fs HFS+ temp.dmg

          # Mount and customize
          DEVICE=$(hdiutil attach -readwrite -noverify temp.dmg | grep '/Volumes/' | awk '{print $1}')
          MOUNT_POINT="/Volumes/$VOLUME_NAME"

          # Set volume icon
          cp VolumeIcon.icns "$MOUNT_POINT/.VolumeIcon.icns"
          SetFile -a C "$MOUNT_POINT"

          # Use AppleScript to set DMG window appearance
          osascript <<EOF
          tell application "Finder"
            tell disk "$VOLUME_NAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {200, 120, 800, 520}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 96
              set background color of theViewOptions to {60652, 60652, 63222}
              set position of item "$APP_NAME" of container window to {150, 180}
              set position of item "Applications" of container window to {450, 180}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          EOF

          # Unmount
          sync
          hdiutil detach "$DEVICE"

          # Convert to compressed read-only DMG
          hdiutil convert temp.dmg -format UDZO -imagekey zlib-level=9 -o "$DMG_NAME"
          rm -f temp.dmg

      - name: Notarize and staple DMG
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          for attempt in 1 2 3 4 5; do
            if xcrun notarytool submit HTCommander.dmg \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait; then
              break
            fi
            if [ "$attempt" = 5 ]; then echo "DMG notarization failed after 5 attempts"; exit 1; fi
            echo "notarytool attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          xcrun stapler staple HTCommander.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: HTCommander.dmg

  build-ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build iOS
        working-directory: src
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: src/build/ios/iphoneos/Runner.app

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Android APK
        working-directory: src
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-build
          path: src/build/app/outputs/flutter-apk/app-release.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Web
        working-directory: src
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: src/build/web/
