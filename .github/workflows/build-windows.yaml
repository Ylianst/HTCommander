name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: src
        run: flutter pub get

      - name: Build Windows
        working-directory: src
        run: flutter build windows --release

      - name: Create MSI installer
        shell: pwsh
        run: |
          # Install WiX Toolset v5
          dotnet tool install --global wix

          $buildDir = "src\build\windows\x64\runner\Release"
          $appName = "HTCommander"
          $exeName = "htcommander.exe"
          $iconPath = "src\assets\images\AppIcon.png"
          $msiOutput = "HTCommander.msi"

          # Convert PNG to ICO using PowerShell
          Add-Type -AssemblyName System.Drawing
          $png = [System.Drawing.Image]::FromFile("$PWD\$iconPath")
          $icon = [System.Drawing.Icon]::FromHandle($png.GetHicon())
          $icoPath = "$PWD\app.ico"
          $fs = [System.IO.File]::Create($icoPath)
          $icon.Save($fs)
          $fs.Close()
          $icon.Dispose()
          $png.Dispose()

          # Generate WiX source by harvesting the build output
          # Create a WXS file that includes all files from the build directory
          $filesXml = ""
          $componentRefs = ""
          $counter = 0
          Get-ChildItem -Path $buildDir -Recurse -File | ForEach-Object {
            $counter++
            $id = "File$counter"
            $compId = "Comp$counter"
            $relativePath = $_.FullName
            $filesXml += "        <Component Id='$compId' Guid='*'>`n"
            $filesXml += "          <File Id='$id' Source='$relativePath' KeyPath='yes' />`n"
            $filesXml += "        </Component>`n"
            $componentRefs += "      <ComponentRef Id='$compId' />`n"
          }

          $wxsContent = @"
          <?xml version='1.0' encoding='UTF-8'?>
          <Wix xmlns='http://wixtoolset.org/schemas/v4/wxs'>
            <Package Name='$appName'
                     Manufacturer='HTCommander'
                     Version='1.0.0.0'
                     UpgradeCode='6B29FC40-CA47-1067-B31D-00DD010662DA'>

              <MajorUpgrade DowngradeErrorMessage='A newer version of $appName is already installed.' />
              <MediaTemplate EmbedCab='yes' />

              <Icon Id='AppIcon' SourceFile='$icoPath' />
              <Property Id='ARPPRODUCTICON' Value='AppIcon' />

              <StandardDirectory Id='ProgramFiles6432Folder'>
                <Directory Id='INSTALLFOLDER' Name='$appName'>
          $filesXml
                </Directory>
              </StandardDirectory>

              <Feature Id='MainFeature' Title='$appName' Level='1'>
          $componentRefs
              </Feature>
            </Package>
          </Wix>
          "@

          $wxsContent | Out-File -FilePath "installer.wxs" -Encoding UTF8

          # Build the MSI
          wix build installer.wxs -o $msiOutput

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: HTCommander.msi
